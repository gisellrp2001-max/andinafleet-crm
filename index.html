:root{

  --radius:12px;
  --shadow:0 8px 24px rgba(7,31,59,.08);
}
body{background:var(--bg);font-size:14px;color:var(--text)}

.topbar{
  background:linear-gradient(120deg,#071F3B 0%,#123A66 100%)!important;
  border-bottom:0!important;
  box-shadow:0 8px 22px rgba(7,31,59,.16);

<body>
<div class="app">
<header class="topbar">
  <div class="brand">
    <div class="logo"><svg viewBox="0 0 40 40" fill="none" aria-hidden="true"><circle cx="20" cy="20" r="14" stroke="currentColor" stroke-width="3"/><path d="M20 20L32 8M25 8h7v7" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg></div>
    <div><h1>Andina Fleet</h1><p>CRM · Sector Minero</p></div>
  </div>
  <div class="search"><input id="search" placeholder="Buscar RUC, empresa, mina o modelo..." /></div>
  <button class="btn gray" onclick="toggleMap()" id="toggleMapBtn">Ocultar mapa</button>
  <button class="btn gray" onclick="document.getElementById('csvFile').click()">Importar CSV</button>
  <input type="file" id="csvFile" accept=".csv" style="display:none" />
  <div class="kpis" id="kpis"></div>
</header>
<div class="layout">
  <aside class="side">
    <div class="notice"><b>Datos:</b> <span id="dataMode">Demo/local</span><br>Para uso real, activa <b>SP_CONFIG</b> y conecta listas SharePoint.</div>
    <label>Región</label><select id="fRegion"></select>
    <label>Línea</label><select id="fLinea"><option value="all">Todas</option><option>Camiones</option><option>Buses</option><option>VCE</option></select>
    <label>Estado actividad</label><select id="fEstado"><option value="all">Todas</option><option value="Pendiente">Pendiente</option><option value="En proceso">En proceso</option><option value="Completada">Completada</option></select>
    <div class="title">Entidades mineras</div><div id="entityList"></div>
  </aside>
  <main class="main">
    <section class="mapWrap" id="mapWrap"><div class="mapTop"><strong>Mapa de operaciones mineras · Perú</strong><span class="small">Leaflet + coordenadas Lat/Long</span></div><div id="map"></div></section>
    <section class="detail" id="detail"></section>
  </main>

function spListUrl(list){
  const safe=String(list||'').replace(/'/g,"''");
  return `${SP_CONFIG.siteUrl}/_api/web/lists/getbytitle('${safe}')/items`;
}
async function spGet(list){
  if(!list) return [];
  const url=`${spListUrl(list)}?$top=5000&_=${Date.now()}`;
  const res=await fetch(url,{
    method:'GET',
    headers:{'Accept':'application/json;odata=nometadata'},
    credentials:'include',
    cache:'no-store'
  });
  if(!res.ok) throw new Error(`Lista ${list}: ${res.status} ${await res.text()}`);
  return (await res.json()).value||[];
}
async function spDigest(){
  const res=await fetch(`${SP_CONFIG.siteUrl}/_api/contextinfo`,{
    method:'POST',headers:{'Accept':'application/json;odata=nometadata'},credentials:'include'
  });
  if(!res.ok) throw new Error(`contextinfo: ${res.status} ${await res.text()}`);
  const j=await res.json();
  return j.FormDigestValue || (j.d && j.d.GetContextWebInformation && j.d.GetContextWebInformation.FormDigestValue);
}
async function spPost(list,body){
  const d=await spDigest();
  const res=await fetch(spListUrl(list),{
    method:'POST',
    headers:{'Accept':'application/json;odata=nometadata','Content-Type':'application/json;odata=nometadata','X-RequestDigest':d},
    credentials:'include',
    body:JSON.stringify(body)
  });
  if(!res.ok) throw new Error(`Crear en ${list}: ${res.status} ${await res.text()}`);
  return await res.json();
}
async function spMerge(list,id,body){
  if(!id) return;
  const d=await spDigest();
  const res=await fetch(`${spListUrl(list)}(${id})`,{
    method:'POST',
    headers:{'Accept':'application/json;odata=nometadata','Content-Type':'application/json;odata=nometadata','X-RequestDigest':d,'IF-MATCH':'*','X-HTTP-Method':'MERGE'},
    credentials:'include',
    body:JSON.stringify(body)
  });
  if(!res.ok) throw new Error(`Actualizar ${list}: ${res.status} ${await res.text()}`);
}
async function spDelete(list,id){
  const d=await spDigest();
  const res=await fetch(`${spListUrl(list)}(${id})`,{
    method:'POST',
    headers:{'X-RequestDigest':d,'IF-MATCH':'*','X-HTTP-Method':'DELETE'},
    credentials:'include'
  });
  if(!res.ok) throw new Error(`Eliminar de ${list}: ${res.status} ${await res.text()}`);
}
async function trySpGet(key){
  try{ return await spGet(SP_CONFIG.lists[key]); }
  catch(e){ console.warn(`No se pudo leer ${key}:`, e); return null; }
}
async function loadData(){
  if(!SP_CONFIG.enabled){ $('dataMode').textContent='Demo/local'; return; }
  $('dataMode').textContent='Conectando...';

  const flotaRows=await trySpGet('flota');
  const actRows=await trySpGet('actividades');

  const entidadRows=await trySpGet('entidades');

  const anyConnected = [flotaRows,actRows,estadoRows,entidadRows].some(x=>Array.isArray(x));
  if(!anyConnected){
    throw new Error('No se pudo leer ninguna lista. Revisa que el HTML esté abierto desde el sitio SharePoint y no desde vista previa/local.');
  }

  if(Array.isArray(flotaRows) && flotaRows.length){
    flota=flotaRows.map(normRow);
  } else if(Array.isArray(entidadRows) && entidadRows.length){
    // Permite probar conexión aunque aún no tengas CRM_Flota cargada.
    flota=entidadRows.map(r=>normRow({...r, Linea:r.Linea||'Camiones', Marca:r.Marca||'', Modelo:r.Modelo||'', Placa:r.Placa||'', Estado:r.Estado||'', Ubicacion:r.Ubicacion||''}));
  }

  if(Array.isArray(actRows)){
    actividades=actRows.map(x=>({
      ID:x.ID,
      RUC:x.RUC,
      Empresa:x.Empresa||x.Title,
      Fecha:(x.Fecha||'').slice(0,10),
      TipoActividad:x.TipoActividad,
      LineaNegocio:x.LineaNegocio||x.Linea,
      Responsable:x.Responsable && x.Responsable.Title ? x.Responsable.Title : (x.Responsable||''),
      Estado:x.Estado,
      Descripcion:x.Descripcion,
      ProximaAccion:x.ProximaAccion,
      FechaCierre:(x.FechaCierre||'').slice(0,10)
    }));
  }

  if(Array.isArray(estadoRows)){
    lineas={};
    estadoRows.forEach(x=>{
      const linea=x.LineaNegocio||x.Linea;
      if(!x.RUC || !linea) return;

    });
  }

  $('dataMode').textContent='SharePoint conectado';
}

        <div><label>Potencial estimado</label><input type="number" value="${Number(d.Valor||0)}" onchange="updateLinea('${e.RUC}','${l}','Valor',this.value)"><div class="small">${money(d.Valor)}</div></div>
      </div>
      <label>Próxima acción / observaciones</label><textarea onchange="updateLinea('${e.RUC}','${l}','Nota',this.value)" placeholder="Ej. Reunión con logística, renovar flota, evaluar proveedor actual...">${esc(d.Nota||'')}</textarea>
    </div>`}).join('')}</div>`
}
function tabActividades(e){
  const allActs=actsByRuc(e.RUC).sort((a,b)=>(b.Fecha||'').localeCompare(a.Fecha||''));
  const acts=activityLineFilter==='all' ? allActs : allActs.filter(a=>a.LineaNegocio===activityLineFilter);
  const pending=acts.filter(a=>a.Estado!=='Completada').length;
  const countLabel=activityLineFilter==='all' ? 'todas las líneas' : activityLineFilter;
  return `<div class="activity-toolbar">
    <div><b style="font-family:var(--display);color:var(--navy)">Seguimiento de actividades</b><div class="small">${acts.length} actividad(es) en ${countLabel} · ${pending} pendiente(s)</div></div>
    <div class="activity-controls">
      <div class="activity-filter"><label>Filtrar por línea</label><select id="activityLineFilter" onchange="setActivityLineFilter(this.value)"><option value="all" ${activityLineFilter==='all'?'selected':''}>Todas</option><option value="Camiones" ${activityLineFilter==='Camiones'?'selected':''}>Camiones</option><option value="Buses" ${activityLineFilter==='Buses'?'selected':''}>Buses</option><option value="VCE" ${activityLineFilter==='VCE'?'selected':''}>VCE</option></select></div>
      <button class="btn" onclick="toggleActivityForm()" id="newActivityBtn">Nueva actividad</button>
    </div>
  </div>
  <div class="box activity-form-card" id="activityFormCard">
    <div class="formGrid"><div><label>Fecha</label><input type="date" id="actFecha" value="${new Date().toISOString().slice(0,10)}"></div><div><label>Tipo</label><select id="actTipo"><option>Llamada</option><option>Visita</option><option>Reunión</option><option>Correo</option><option>Cotización</option></select></div><div><label>Línea</label><select id="actLinea"><option ${activityLineFilter==='Camiones'?'selected':''}>Camiones</option><option ${activityLineFilter==='Buses'?'selected':''}>Buses</option><option ${activityLineFilter==='VCE'?'selected':''}>VCE</option></select></div><div><label>Estado</label><select id="actEstado"><option>Pendiente</option><option>En proceso</option><option>Completada</option></select></div><div><label>Responsable</label><input id="actResp" placeholder="Nombre"></div><div class="full"><label>Descripción</label><textarea id="actDesc" placeholder="Detalle del seguimiento..."></textarea></div><div class="full"><label>Próxima acción</label><input id="actNext" placeholder="Ej. Enviar cotización el viernes"></div></div><br><div class="actions"><button class="btn" onclick="addActivity()">Guardar actividad</button><button class="btn light" onclick="toggleActivityForm(false)">Cancelar</button></div>
  </div>
  ${acts.length?acts.map(a=>`<div class="activity ${a.Estado==='Completada'?'done':a.Estado==='En proceso'?'process':''}"><div><b>${esc(a.TipoActividad)} · ${esc(a.LineaNegocio)}</b> <span class="status-chip ${a.Estado==='Completada'?'status-done':a.Estado==='En proceso'?'status-proc':'status-pend'}">${esc(a.Estado)}</span><div class="small">${esc(a.Fecha)} · ${esc(a.Responsable)}</div><p>${esc(a.Descripcion)}</p>${a.ProximaAccion?`<div class="small">Próxima acción: ${esc(a.ProximaAccion)}</div>`:''}</div><div class="actions">${a.Estado!=='Completada'?`<button class="btn light small" onclick="askCompleteAct('${a.ID||a.localId}')">Completar</button>`:''}<button class="btn danger small" onclick="askDeleteAct('${a.ID||a.localId}')">Eliminar</button></div></div>`).join(''):`<div class="empty">No hay actividades para ${countLabel}. Usa <b>Nueva actividad</b> para registrar seguimiento.</div>`}`
}
function setActivityLineFilter(value){
  activityLineFilter=value;
  renderDetail();
}
async function updateLinea(ruc,linea,field,val){
  const d=ensureLineas(ruc)[linea];
  d[field]=field==='Valor'?Number(val||0):val;
  saveLocal();
  if(SP_CONFIG.enabled){
    try{
      const e=entidades().find(x=>x.RUC===ruc) || {};
      const body={Title:e.Empresa||ruc,RUC:ruc,Empresa:e.Empresa||'',Linea:linea,EstadoRelacion:d.EstadoRelacion||'Sin oportunidad',Observacion:d.Nota||'',ProximaAccion:d.Nota||''};
      if(d.ID) await spMerge(SP_CONFIG.lists.estado,d.ID,body);
      else { const created=await spPost(SP_CONFIG.lists.estado,body); d.ID=created.ID; saveLocal(); }
    }catch(err){ alert('No se pudo guardar Estado Volvo en SharePoint: '+err.message); }
  }
  renderAll();
}
function toggleHistory(id){const el=$('hist-'+id);if(el)el.classList.toggle('show')}
async function addVenta(ruc,linea){const v={localId:'local-v-'+Date.now(),RUC:ruc,LineaNegocio:linea,Fecha:$(`v-${ruc}-${linea}-Fecha`).value,Responsable:$(`v-${ruc}-${linea}-Resp`).value||'Sin asignar',Unidades:Number($(`v-${ruc}-${linea}-Un`).value||0),Monto:Number($(`v-${ruc}-${linea}-Monto`).value||0),Comentario:$(`v-${ruc}-${linea}-Com`).value};if(!v.Comentario){$(`v-${ruc}-${linea}-Com`).focus();return}if(SP_CONFIG.enabled){const c=await spPost(SP_CONFIG.lists.ventas,{Title:linea,RUC:ruc,LineaNegocio:linea,Fecha:v.Fecha,Responsable:v.Responsable,Unidades:v.Unidades,Monto:v.Monto,Comentario:v.Comentario});v.ID=c.ID}ventas.push(v);saveLocal();renderAll()}
async function addActivity(){const e=entidades().find(x=>x.RUC===selectedRuc);const act={localId:'local-'+Date.now(),RUC:e.RUC,Empresa:e.Empresa,Fecha:$('actFecha').value,TipoActividad:$('actTipo').value,LineaNegocio:$('actLinea').value,Responsable:$('actResp').value||'Sin asignar',Estado:$('actEstado').value,Descripcion:$('actDesc').value,ProximaAccion:$('actNext').value};if(!act.Descripcion){$('actDesc').focus();return}if(SP_CONFIG.enabled){const c=await spPost(SP_CONFIG.lists.actividades,{Title:act.Empresa,RUC:act.RUC,Empresa:act.Empresa,Fecha:act.Fecha,TipoActividad:act.TipoActividad,LineaNegocio:act.LineaNegocio,Responsable:act.Responsable,Estado:act.Estado,Descripcion:act.Descripcion,ProximaAccion:act.ProximaAccion});act.ID=c.ID}actividades.push(act);saveLocal();renderAll()}
function askDeleteAct(id){pendingDelete=id;$('modalTitle').textContent='Eliminar actividad';$('modalText').textContent='¿Confirmas que deseas eliminar esta actividad?';$('confirmDeleteBtn').textContent='Sí, eliminar';$('confirmDeleteBtn').className='btn danger';$('confirmDeleteBtn').onclick=deleteActivity;$('modalBack').style.display='flex'}
function closeModal(){pendingDelete=null;$('modalBack').style.display='none';$('confirmDeleteBtn').textContent='Sí, eliminar';$('confirmDeleteBtn').className='btn danger'}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
document.getElementById('modalBack').addEventListener('click',e=>{if(e.target.id==='modalBack')closeModal()});
async function deleteActivity(){const a=actividades.find(x=>(x.ID||x.localId)==pendingDelete);if(SP_CONFIG.enabled&&a&&a.ID)await spDelete(SP_CONFIG.lists.actividades,a.ID);actividades=actividades.filter(x=>(x.ID||x.localId)!=pendingDelete);saveLocal();closeModal();renderAll()}
function toggleActivityForm(force){
  const form=$('activityFormCard'); if(!form)return;
  const show = force===undefined ? !form.classList.contains('show') : force;
  form.classList.toggle('show', show);
  const btn=$('newActivityBtn'); if(btn)btn.textContent=show?'Cerrar formulario':'Nueva actividad';
}
function askCompleteAct(id){
  pendingDelete=id;
  $('modalTitle').textContent='Completar actividad';
  $('modalText').textContent='¿Confirmas que esta actividad ya fue completada?';
  $('confirmDeleteBtn').textContent='Sí, completar';
  $('confirmDeleteBtn').className='btn';
  $('confirmDeleteBtn').onclick=completeActivity;
  $('modalBack').style.display='flex';
}
async function completeActivity(){
  await changeActStatus(pendingDelete,'Completada');
  closeModal();
}
async function changeActStatus(id,status){
  const a=actividades.find(x=>(x.ID||x.localId)==id);
  if(a){
    a.Estado=status;
    if(status==='Completada') a.FechaCierre=new Date().toISOString().slice(0,10);
    if(SP_CONFIG.enabled && a.ID){
      try{ await spMerge(SP_CONFIG.lists.actividades,a.ID,{Estado:a.Estado,FechaCierre:a.FechaCierre||null}); }
      catch(err){ alert('No se pudo actualizar la actividad en SharePoint: '+err.message); }
    }
    saveLocal();
    renderAll();
  }
}

function parseCSV(text){const lines=text.split(/\r?\n/).filter(Boolean);const headers=lines.shift().split(',').map(h=>h.trim());return lines.map(line=>{const cols=line.split(',').map(c=>c.trim());const o={};headers.forEach((h,i)=>o[h]=cols[i]||'');return normRow(o)})}
$('csvFile').addEventListener('change',e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{flota=parseCSV(r.result);selectedRuc=null;lineas={};ventas=[];actividades=[];saveLocal();renderAll();alert('CSV importado. La flota se cuenta por RUC según cantidad de filas.')};r.readAsText(file,'UTF-8')});
$('search').addEventListener('input',e=>{filters.search=e.target.value;renderAll()});$('fRegion').addEventListener('change',e=>{filters.region=e.target.value;renderAll()});$('fLinea').addEventListener('change',e=>{filters.linea=e.target.value;renderAll()});$('fEstado').addEventListener('change',e=>{filters.estado=e.target.value;renderAll()});
function renderAll(){renderFilters();renderKpis();renderList();renderMap();renderDetail()}
(async()=>{
  initMap();
  try{ await loadData(); }
  catch(e){
    console.error('Error SharePoint:', e);
    alert('No se pudo conectar con SharePoint. Se usará modo local. Detalle: '+e.message);
    $('dataMode').textContent='Demo/local por error de conexión';
    SP_CONFIG.enabled=false;
  }
  renderAll();
})();
</script>
</body>
</html>
